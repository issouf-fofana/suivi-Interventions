<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Suivi des Interventions</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { height: 100%; margin: 0; }
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--fond);
      padding: 24px;
    }
    .error-card {
      background: var(--blanc);
      border: 1px solid var(--bordure);
      border-radius: 20px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--ombre-md);
    }
    .error-icon {
      width: 80px; height: 80px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      color: #d97706;
    }
    .error-code {
      font-size: 72px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 12px;
    }
    .error-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--texte);
      margin-bottom: 10px;
    }
    .error-desc {
      font-size: 14px;
      color: var(--texte-doux);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-url {
      display: inline-block;
      background: var(--gris-100);
      border: 1px solid var(--bordure);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-family: monospace;
      color: var(--texte-doux);
      margin-bottom: 28px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-card">
    <div class="error-icon">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="error-code">404</div>
    <div class="error-title">Page introuvable</div>
    <div class="error-desc">
      L'adresse que vous avez saisie n'existe pas ou a été déplacée.
    </div>
    <div class="error-url" id="badUrl"></div>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary" id="btnAccueil">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Retour à l'accueil
      </a>
      <button class="btn btn-ghost" onclick="history.back()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Page précédente
      </button>
    </div>
  </div>
</div>

<script>
  // Afficher l'URL fautive
  document.getElementById('badUrl').textContent = window.location.href;

  // Charger le thème sauvegardé
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);

  // Si connecté → accueil sur index.html, sinon login.html
  const token = localStorage.getItem('auth_token');
  if (!token) {
    document.getElementById('btnAccueil').href = 'login.html';
    document.getElementById('btnAccueil').querySelector('span, svg + svg') ;
  }
</script>
</body>
</html>
